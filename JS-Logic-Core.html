<script>
// Plik: JS-Logic-Core.html
// Moduł: Rdzeń Logiki (Inicjalizacja, Pobieranie Danych, Eventy, Persistence, URLOPY V6 - SAFE APPROVE)

document.addEventListener('DOMContentLoaded', () => {
  console.log("🚀 Aplikacja startuje (Logic Core)...");
  
  if (typeof state === 'undefined' || typeof dom === 'undefined') {
      alert("Błąd krytyczny: Nie załadowano stanu aplikacji. Odśwież stronę.");
      return;
  }

  // 1. Start pobierania danych
  fetchAllData();

// =====================================================
// === POBIERANIE DANYCH STARTOWYCH ===
// =====================================================

function fetchAllData(retryCount = 0) {
  console.log(`🔄 Pobieranie danych startowych... (Próba: ${retryCount + 1})`);

  if (dom.unifiedList && retryCount === 0) {
      dom.unifiedList.innerHTML = '<div class="p-8 text-center text-slate-400 text-sm"><div class="loader-sm mb-2"></div>Ładowanie systemu...</div>';
  }

  google.script.run
    .withSuccessHandler(data => {
      // --- MECHANIZM RETRY ---
      if (!data) {
        if (retryCount < 5) { 
            const delay = 1500 + (retryCount * 1000); 
            console.warn(`⚠️ Puste dane (Próba ${retryCount + 1}/5). Czekam ${delay}ms...`);
            setTimeout(() => fetchAllData(retryCount + 1), delay);
            return;
        }
        
        handleServerError({ message: "Serwer zajęty. Odśwież stronę (F5) za chwilę." });
        return;
      }
      
      // 1. Pracownicy i Metadane
      if (data.employeeMeta) {
          state.employees = Array.isArray(data.employees) ? data.employees : [];
          state.employeeMeta = data.employeeMeta;
      } else {
          state.employees = Array.isArray(data.employees) ? data.employees : [];
          state.employeeMeta = { source: 'LIVE', date: new Date().toLocaleDateString('pl-PL'), timestamp: Date.now() }; 
      }

      state.tasks = Array.isArray(data.tasks) ? data.tasks : [];
      state.currentUserEmail = data.currentUserEmail || '';
      
      // 2. Planowanie
      state.planningData = Array.isArray(data.planningData) ? data.planningData : [];
      
      // 3. Urlopy (LAZY LOAD - Puste na start)
      state.vacations = []; 
      state.isVacationsLoaded = false;

      // 4. Statystyki Grupy
      state.groupStats = data.groupStats || { total: 0, present: 0, trained: 0, availableStow: 0, plan: [], subgroups: { A: {total:0, present:0}, B: {total:0, present:0} } };
      
      // 5. Ustawienia
      if (data.settings) {
          state.settings = data.settings;
      }
      
      state.widgets = data.widgets || {
          stow: { today: [], recent: [], recentDateLabel: '' },
          carts: { today: [], recent: [], recentDateLabel: '' },
          missions: { today: [], recent: [], recentDateLabel: '' },
          support: { today: [], recent: [], recentDateLabel: '' }
      };
      
      state.isDataLoaded = true;
      
      // 6. Tryb Startowy
      const startMode = state.settings.defaultMode || 'tasks';
      state.currentMode = startMode;
      
      updateInterfaceForMode(startMode);
      
      if (dom.modeSelector) {
          dom.modeSelector.querySelectorAll('button').forEach(b => {
              if (b.dataset.mode === startMode) b.classList.add('active');
              else b.classList.remove('active');
          });
      }

      try {
        if (startMode !== 'tasks') {
            loadRotationalData();
        } else {
            renderUnifiedList(); 
        }

        if (typeof renderAllTasks === 'function') renderAllTasks();
        if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI();
        
      } catch (err) {
        handleServerError(err, "Błąd renderowania startowego");
      }
    })
    .withFailureHandler(handleServerError)
    .getInitialData();
}

          if (state.currentMode === newMode) return;
          if (typeof clearEmployeeSelection === 'function') clearEmployeeSelection();
          dom.modeSelector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.currentMode = newMode;
          updateInterfaceForMode(newMode);

          if (newMode !== 'tasks') loadRotationalData(); 
          else renderUnifiedList();

  if(dom.cancelDeleteBtn) dom.cancelDeleteBtn.addEventListener('click', () => { state.taskToDelete = { id: null, isBulk: false }; closeDeleteModalUI(); });

  if(dom.cancelEditBtn) dom.cancelEditBtn.addEventListener('click', closeEditModalUI);
  if(dom.saveChangesBtn) dom.saveChangesBtn.addEventListener('click', handleSaveChanges);

  if(dom.closeHistoryBtn) dom.closeHistoryBtn.addEventListener('click', closeHistoryModalUI);
  if(dom.historyModal) dom.historyModal.addEventListener('click', (e) => { if (e.target === dom.historyModal) closeHistoryModalUI(); });

  // Kategorie statyczne są już obsługiwane inline w widgecie, ale dla pewności:
  if (dom.categoryButtons) {
    dom.categoryButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const newCategory = e.currentTarget.dataset.category;
        if (typeof handleCategorySwitch === 'function') handleCategorySwitch(newCategory, e.currentTarget);
      });
    });
  }

  if (dom.settingsBtn) dom.settingsBtn.addEventListener('click', openSettingsModalUI);
  if (dom.closeSettingsBtn) dom.closeSettingsBtn.addEventListener('click', closeSettingsModalUI);
  if (dom.settingsModal) dom.settingsModal.addEventListener('click', (e) => { if (e.target === dom.settingsModal) closeSettingsModalUI(); });
  if (dom.addSupportRoleBtn) dom.addSupportRoleBtn.addEventListener('click', () => addRoleUI('support'));
  if (dom.addMissionRoleBtn) dom.addMissionRoleBtn.addEventListener('click', () => addRoleUI('missions'));
  if (dom.saveSettingsBtn) dom.saveSettingsBtn.addEventListener('click', () => { if (typeof saveSettingsUI === 'function') saveSettingsUI(); });
  if (dom.confirmCollisionBtn) dom.confirmCollisionBtn.addEventListener('click', confirmCollisionUI);
  if (dom.clearSelectionBtn) dom.clearSelectionBtn.addEventListener('click', () => { if (typeof clearEmployeeSelection === 'function') clearEmployeeSelection(); });
  if (dom.saveVacationBtn) dom.saveVacationBtn.addEventListener('click', handleSaveVacation);

  if (dom.vacationStart) {
      dom.vacationStart.addEventListener('change', (e) => {
          if (dom.vacationEnd && !dom.vacationEnd.value) {

          }

}

function loadRotationalData() {
  const mode = state.currentMode;
  if (dom.unifiedList) dom.unifiedList.innerHTML = `<div class="p-8 text-center text-slate-400 text-sm"><div class="loader-sm mb-2"></div>Pobieranie danych: ${mode}...</div>`;
  google.script.run.withSuccessHandler(data => {
      const sorted = [...data].sort((a, b) => {
        if (a.isExcluded !== b.isExcluded) return (a.isExcluded ? 1 : 0) - (b.isExcluded ? 1 : 0);
        if (a.wasToday !== b.wasToday) return (a.wasToday ? 1 : 0) - (b.wasToday ? 1 : 0);
        if (a.weekCount !== b.weekCount) return a.weekCount - b.weekCount;
        return a.name.localeCompare(b.name, 'pl');
      });
      state.stowData = sorted; 
      state.isStowLoaded = true;
      renderUnifiedList();
      if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI();
    })
    .withFailureHandler(err => {
      if (typeof showToast === 'function') showToast("Błąd pobierania danych: " + err.message, 'error');
      if (dom.unifiedList) dom.unifiedList.innerHTML = `<div class="p-4 text-center text-red-400">Błąd: ${err.message}</div>`;
    })
    .getRotationalData(mode); 
}

// =====================================================
// === LOGIKA URLOPÓW (VACATIONS) - FAIR PLAY ALGORITHM 2.0 ===
// =====================================================

function calculateFairnessScore(req, allVacations) {
    let score = 100;
    
    // 1. Wyprzedzenie (Advance Notice)
    const start = new Date(req.startDate);
    const submit = new Date(req.timestamp);
    const diffTime = start - submit;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
    
    // Kara za Last Minute (< 7 dni) lub bonus za planowanie
    if (diffDays < 7) {
        score -= 20; 
    } else if (diffDays > 0) {
        // +0.5 pkt za każdy dzień wyprzedzenia (max 30 pkt)
        score += Math.min(30, Math.floor(diffDays * 0.5));
    }

    // 2. Długość (Duration Penalty)
    const duration = getDaysCount(req.startDate, req.endDate);
    if (duration > 14) {
        score -= (duration - 14) * 2; // -2 pkt za każdy dzień powyżej 2 tygodni
    }

    // 3. Historia SEZONU (Specific Season History Penalty)
    // Liczymy ile dni pracownik był na urlopie w tym samym sezonie ROK TEMU
    const reqYear = parseInt(req.startDate.substring(0,4));
    const prevYear = reqYear - 1;
    
    const seasonHistory = allVacations.filter(v => 
        v.name === req.name && 
        v.season === req.season && 
        v.status === 'Potwierdzony' &&
        (v.startDate.includes(String(prevYear)) || v.endDate.includes(String(prevYear)))
    );
    
    const seasonDays = seasonHistory.reduce((sum, v) => sum + (v.daysCount || 0), 0);
    if (seasonDays > 0) {
        score -= (seasonDays * 5); // -5 pkt za każdy dzień urlopu w tym samym sezonie rok temu
    }

    // 4. Historia OGÓLNA (General Annual History Penalty)
    // -1 pkt za każdy dzień urlopu w całym zeszłym roku (balans)
    const annualHistory = allVacations.filter(v => 
        v.name === req.name && 
        v.status === 'Potwierdzony' &&
        (v.startDate.includes(String(prevYear)) || v.endDate.includes(String(prevYear)))
    );
    const annualDays = annualHistory.reduce((sum, v) => sum + (v.daysCount || 0), 0);
    if (annualDays > 0) {
        score -= annualDays; 
    }

    return Math.max(0, Math.round(score));
}

// --- HELPERY MATEMATYCZNE ---

function getISOWeek(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
    const week1 = new Date(d.getFullYear(), 0, 4);
    return 1 + Math.round(((d.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function getWeekRangeDates(year, week) {
    const simple = new Date(year, 0, 1 + (week - 1) * 7);
    const dow = simple.getDay();
    const isoWeekStart = simple;
    if (dow <= 4) isoWeekStart.setDate(simple.getDate() - simple.getDay() + 1);
    else isoWeekStart.setDate(simple.getDate() + 8 - simple.getDay());
    const isoWeekEnd = new Date(isoWeekStart);
    isoWeekEnd.setDate(isoWeekEnd.getDate() + 6);
    return { start: isoWeekStart, end: isoWeekEnd };
}

function getDaysCount(startStr, endStr) {
    const oneDay = 24 * 60 * 60 * 1000;
    const firstDate = new Date(startStr);
    const secondDate = new Date(endStr);
    return Math.round(Math.abs((firstDate - secondDate) / oneDay)) + 1;
}

function formatDateShort(dateObj) {
    const d = new Date(dateObj);
    return d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit' });
}

function getWeeksBetween(startDateStr, endDateStr) {
    const start = new Date(startDateStr);
    const end = new Date(endDateStr);
    const weeks = [];
    let current = new Date(start);
    while (current <= end) {
        let year = current.getFullYear();
        const week = getISOWeek(current);
        const month = current.getMonth();
        if (month === 0 && week > 50) year--;
        else if (month === 11 && week === 1) year++;
        const key = `${year}-W${week}`; 
        if (!weeks.includes(key)) weeks.push(key);
        current.setDate(current.getDate() + 1);
    }
    return weeks;
}

function groupVacationsByWeeks(vacations) {
    const weeksMap = {}; 
    vacations.forEach(v => {
        if (v.status === 'Odrzucony') return; 
        const vacStart = new Date(v.startDate);
        const vacEnd = new Date(v.endDate);
        const weeks = getWeeksBetween(v.startDate, v.endDate);
        weeks.forEach(key => {
            const [yStr, wStr] = key.split('-W');
            const y = parseInt(yStr);
            const w = parseInt(wStr);
            if (!weeksMap[key]) {
                weeksMap[key] = { id: key, label: `Tydzień ${w}`, year: y, week: w, requests: [] };
            }
            const { start: weekStart, end: weekEnd } = getWeekRangeDates(y, w);
            const rangeStart = (vacStart > weekStart) ? vacStart : weekStart;
            const rangeEnd = (vacEnd < weekEnd) ? vacEnd : weekEnd;
            if (rangeStart <= rangeEnd) {
                const localDays = Math.round((rangeEnd - rangeStart) / (1000 * 60 * 60 * 24)) + 1;
                const localRangeStr = `${formatDateShort(rangeStart)} - ${formatDateShort(rangeEnd)}`;
                const localReq = { ...v, localDaysCount: localDays, localRange: localRangeStr, weekStartIso: rangeStart.toISOString(), weekEndIso: rangeEnd.toISOString() };
                weeksMap[key].requests.push(localReq);
            }
        });
    });
    
    // Sortowanie wniosków w tygodniu wg Algorytmu Fair Play
    Object.values(weeksMap).forEach(weekObj => {
        weekObj.requests.sort((a, b) => {
            // Najpierw punkty (malejąco)
            if (a.score !== b.score) return b.score - a.score;
            // Potem data zgłoszenia (rosnąco) - dla remisów (kto pierwszy zgłosił)
            return a.timestamp - b.timestamp;
        });
    });
    
    return Object.values(weeksMap).sort((a, b) => {
        if (a.year !== b.year) return a.year - b.year;
        return a.week - b.week;
    });
}

// === OBSŁUGA SZYBKICH DAT ===
window.setVacationQuickDate = function(type) {
    const startInput = dom.vacationStart;
    const endInput = dom.vacationEnd;
    
    if (!startInput || !startInput.value) {
        showToast("Najpierw wybierz datę 'Od'.", 'warning');
        return;
    }
    
    const startDate = new Date(startInput.value);
    let endDate = new Date(startDate);
    
    if (typeof type === 'number') {
        endDate.setDate(endDate.getDate() + type);
    } 
    else if (type === 'weekend') {
        const day = startDate.getDay(); 
        const distToFriday = (5 - day + 7) % 7;
        startDate.setDate(startDate.getDate() + distToFriday);
        endDate = new Date(startDate);
        endDate.setDate(endDate.getDate() + 2);
        startInput.value = startDate.toISOString().split('T')[0];
    }
    
    endInput.value = endDate.toISOString().split('T')[0];
};

window.setVacationViewMode = function(viewMode) {
    state.vacationViewMode = viewMode;
    if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI();
};

window.fetchVacations = function(year) {
    if (state.isVacationsFetching) return;
    state.isVacationsFetching = true;
    if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI(); 
    google.script.run.withSuccessHandler(data => {
            // Wstępne obliczenie dni
            const enrichedData = data.map(v => ({ ...v, daysCount: getDaysCount(v.startDate, v.endDate) }));
            
            // Obliczenie Fair Play Score (przekazujemy całą listę, bo zawiera też historię)
            enrichedData.forEach(v => {
                v.score = calculateFairnessScore(v, enrichedData);
            });

            state.vacations = enrichedData;
            state.isVacationsLoaded = true;
            state.isVacationsFetching = false;
            if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI();
        }).withFailureHandler(err => {
            state.isVacationsFetching = false;
            showToast("Błąd pobierania urlopów: " + err.message, 'error');
            if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI();
        }).getVacations(year);
};

function handleSaveVacation() {
    let selectedNames = [];
    if (state.currentMode === 'tasks') selectedNames = Array.from(state.selectedEmployeeNames);
    else selectedNames = Array.from(state.pendingAssignments.keys());

    if (selectedNames.length === 0) { showToast("Błąd: Brak wybranych pracowników.", 'error'); return; }

    const start = dom.vacationStart ? dom.vacationStart.value : '';
    const end = dom.vacationEnd ? dom.vacationEnd.value : '';
    const note = dom.vacationNote ? dom.vacationNote.value : '';
    const isConfirmed = dom.vacationConfirmed ? dom.vacationConfirmed.checked : false;

    if (!start || !end) { showToast("Wybierz daty Od i Do.", 'error'); return; }
    if (new Date(start) > new Date(end)) { showToast("Data 'Do' nie może być wcześniejsza niż 'Od'.", 'error'); return; }

    const btn = dom.saveVacationBtn;
    if (btn) { btn.disabled = true; btn.textContent = "Zapisywanie..."; }

    // Obsługa ręcznego timestampu
    let customTimestamp = null;
    if (dom.vacationSubmitDate && dom.vacationSubmitDate.value && dom.vacationSubmitTime && dom.vacationSubmitTime.value) {
        customTimestamp = new Date(dom.vacationSubmitDate.value + 'T' + dom.vacationSubmitTime.value).toISOString();
    }

    const payload = { 
        name: selectedNames, 
        startDate: start, 
        endDate: end, 
        note: note, 
        status: isConfirmed ? "Potwierdzony" : "Oczekujący",
        customTimestamp: customTimestamp // Przekazanie do backendu
    };

    google.script.run.withSuccessHandler(res => {
            showToast(res.message, 'success');
            if (btn) { btn.disabled = false; btn.textContent = "Zapisz Wniosek"; }
            closeVacationModalUI();
            fetchVacations(state.vacationFilters.year);
            if (typeof clearEmployeeSelection === 'function') clearEmployeeSelection();
        }).withFailureHandler(err => {
            showToast("Błąd zapisu: " + err.message, 'error');
            if (btn) { btn.disabled = false; btn.textContent = "Zapisz Wniosek"; }
        }).addVacationRequest(payload);
}

// === ZMODYFIKOWANA FUNKCJA ZATWIERDZANIA Z OBSŁUGĄ SPLITU I ANULOWANIA ===
window.handleVacationStatus = function(id, newStatus, optionalWeekData) {
    // optionalWeekData: { label: 'Tydzień X', startIso: '...', endIso: '...' } z widoku tygodniowego
    
    // Jeśli zatwierdzamy z widoku tygodniowego, pytamy o podział
    if (newStatus === 'Potwierdzony' && optionalWeekData) {
        const confirmSplit = confirm(`Czy zatwierdzić wniosek TYLKO dla zakresu: ${optionalWeekData.label}?\n(${formatDateShort(optionalWeekData.startIso)} - ${formatDateShort(optionalWeekData.endIso)})\n\nOK = Zatwierdź ten tydzień (podziel urlop).\nAnuluj = Anuluj akcję (nic nie zmieniaj).`);
        
        if (confirmSplit) {
            // Logika podziału (Split & Approve)
            if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI(); // Pokaż loader
            
            google.script.run
                .withSuccessHandler(res => {
                    showToast(res.message, 'success');
                    fetchVacations(state.vacationFilters.year);
                })
                .withFailureHandler(err => {
                    showToast("Błąd podziału: " + err.message, 'error');
                    fetchVacations(state.vacationFilters.year);
                })
                .approveVacationSplit(id, optionalWeekData.startIso, optionalWeekData.endIso);
            return; // Stop here
        } else {
            // Jeśli użytkownik kliknął Anuluj -> nie rób nic (nie zatwierdzaj całości)
            return;
        }
    }

    // Standardowe zatwierdzenie (całości) LUB Cofnięcie (do 'Oczekujący') LUB Odrzucenie
    const vac = state.vacations.find(v => v.id === id);
    if (vac) vac.status = newStatus; // Optimistic update
    if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI();
    
    google.script.run.withSuccessHandler(res => { 
        showToast(res.message, 'success'); 
        fetchVacations(state.vacationFilters.year); 
    }).withFailureHandler(err => { 
        showToast("Błąd zmiany statusu: " + err.message, 'error'); 
        fetchVacations(state.vacationFilters.year); 
    }).updateVacationStatus(id, newStatus);
};

window.handleVacationDelete = function(id, name) {
    if (!confirm(`Czy na pewno usunąć wniosek urlopowy dla: ${name}?`)) return;
    state.vacations = state.vacations.filter(v => v.id !== id);
    if (typeof renderStowersWidgetUI === 'function') renderStowersWidgetUI();
    google.script.run.withSuccessHandler(res => { showToast(res.message, 'success'); fetchVacations(state.vacationFilters.year); }).withFailureHandler(err => { showToast("Błąd usuwania: " + err.message, 'error'); fetchVacations(state.vacationFilters.year); }).deleteVacationRequest(id);
};
