<script>
// Plik: JS-UI-List.html
// Moduł: Renderowanie Listy Pracowników
// Wersja: Smart Cache Fallback UI (Banners & Blocking)

console.log("Ładowanie modułu UI List...");

// =====================================================
// === HELPER: DETEKCJA KOLIZJI ===
// =====================================================

function findActiveAssignment(employeeName) {
    if (!state.widgets) return null;
    
    const modes = ['stow', 'carts', 'support', 'beauty'];
    const activeAssignments = [];

    // 1. Sprawdź aktywne widgety
    for (let i = 0; i < modes.length; i++) {
        const mode = modes[i];
        if (mode === state.currentMode) continue;

        const data = state.widgets[mode];
        if (data && data.today && Array.isArray(data.today)) {
            const isAssigned = data.today.some(function(p) { return p.name === employeeName; });
            if (isAssigned) {
                let label = mode;
                if(mode === 'stow') label = 'STOW';
                if(mode === 'carts') label = 'Carty';
                if(mode === 'support') label = 'Wsparcie';
                if(mode === 'beauty') label = 'Beauty';
                activeAssignments.push(label);
            }
        }
    }

    // 2. Sprawdź Planowanie Zewnętrzne
    if (state.planningData && Array.isArray(state.planningData)) {
        const found = state.planningData.some(function(pName) {
            const clean = pName.replace(" (STOW)", "").trim();
            return clean === employeeName;
        });
        
        if (found && !activeAssignments.includes('Beauty')) {
            activeAssignments.push('Beauty (Plan)');
        }
    }

    if (activeAssignments.length > 0) {
        return activeAssignments.join(', ');
    }
    return null;
}

// =====================================================
// === HELPER: IKONY SZKOLEŃ ===
// =====================================================

function getSkillIcons(skills) {
    if (!skills) return '';
    
    const badges = [
        { key: 'stow',      label: 'STW', color: 'bg-indigo-100 text-indigo-700 border-indigo-200' },
        { key: 'pack',      label: 'PCK', color: 'bg-violet-100 text-violet-700 border-violet-200' },
        { key: 'sort',      label: 'SRT', color: 'bg-fuchsia-100 text-fuchsia-700 border-fuchsia-200' },
        { key: 'receive',   label: 'RCV', color: 'bg-sky-100 text-sky-700 border-sky-200' },
        { key: 'unloading', label: 'UNL', color: 'bg-stone-100 text-stone-600 border-stone-200' },
        { key: 'carts',     label: 'CRT', color: 'bg-orange-100 text-orange-700 border-orange-200' },
        { key: 'shipping',  label: 'SHP', color: 'bg-teal-100 text-teal-700 border-teal-200' },
        { key: 'returns',   label: 'RET', color: 'bg-rose-100 text-rose-700 border-rose-200' },
        { key: 'quality',   label: 'Q',   color: 'bg-yellow-100 text-yellow-700 border-yellow-200' },
        { key: 'beauty',    label: 'B',   color: 'bg-pink-100 text-pink-700 border-pink-200' }
    ];

    let html = '<div class="flex flex-wrap gap-0.5 mt-0.5">';
    let hasSkill = false;
    for (let i = 0; i < badges.length; i++) {
        const b = badges[i];
        if (skills[b.key]) {
            html += '<span class="text-[8px] font-bold px-1 rounded border ' + b.color + '" title="' + b.key + '">' + b.label + '</span>';
            hasSkill = true;
        }
    }
    html += '</div>';
    
    return hasSkill ? html : '';
}

// =====================================================
// === GŁÓWNY RENDERER LISTY ===
// =====================================================

function renderUnifiedList() {
  if (!state || !dom.unifiedList) {
      console.error("Brak stanu lub elementu DOM listy.");
      return;
  }

  // --- LOGIKA OSTRZEŻEŃ CACHE ---
  const meta = state.employeeMeta || { source: 'LIVE' };
  const todayStr = new Date().toLocaleDateString('pl-PL');
  const isDataOld = meta.date !== todayStr;
  
  // 1. Ekran Blokady (Brak danych lub stare dane bez potwierdzenia)
  if (meta.source === 'NONE') {
      dom.unifiedList.innerHTML = `
        <div class="flex flex-col items-center justify-center h-64 p-6 text-center text-slate-500">
            <div class="bg-slate-100 p-4 rounded-full mb-4">
                <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h3 class="font-bold text-lg text-slate-700 mb-2">Brak Time Trackingu</h3>
            <p class="text-xs max-w-[200px] leading-relaxed">System nie wykrył jeszcze obecności na dzień dzisiejszy (${todayStr}). Czekamy na wgranie danych do arkusza.</p>
            <button onclick="fetchAllData()" class="mt-4 px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded hover:bg-blue-700 transition">Odśwież</button>
        </div>`;
      return;
  }

  if (meta.source === 'CACHE' && isDataOld && !state.showOldDataConfirmed) {
      dom.unifiedList.innerHTML = `
        <div class="flex flex-col items-center justify-center h-auto p-6 text-center text-slate-500 mt-10">
            <div class="bg-amber-50 p-4 rounded-full mb-4 ring-1 ring-amber-100">
                <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="font-bold text-lg text-slate-700 mb-1">Brak danych na dziś</h3>
            <p class="text-xs text-slate-400 mb-4">(${todayStr})</p>
            <p class="text-xs max-w-[220px] leading-relaxed mb-6">Time Tracking nie został jeszcze wgrany. W pamięci dostępna jest lista obecności z dnia: <b class="text-slate-600">${meta.date}</b>.</p>
            
            <div class="flex flex-col gap-2 w-full max-w-[200px]">
                <button onclick="fetchAllData()" class="w-full px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Sprawdź ponownie
                </button>
                <button onclick="confirmShowOldData()" class="w-full px-4 py-2 bg-white border border-slate-300 text-slate-600 text-xs font-bold rounded hover:bg-slate-50 transition">
                    Użyj danych z ${meta.date}
                </button>
            </div>
        </div>`;
      return;
  }

  // --- RENDEROWANIE WŁAŚCIWE ---

  try {
      const mode = state.currentMode;
      const searchTerm = dom.globalSearch ? dom.globalSearch.value.toLowerCase() : '';
      
      const isListDisabled = (mode === 'tasks' && !state.isEmployeeTaskMode);

      const recentWidgetList = (mode !== 'tasks' && state.widgets && state.widgets[mode]) ? state.widgets[mode].recent : [];
      const recentNamesSet = new Set(recentWidgetList.map(function(r){ return r.name; }));
      const recentDateLabel = (mode !== 'tasks' && state.widgets && state.widgets[mode]) ? state.widgets[mode].recentDateLabel : '';

      // 1. Dobór źródła danych
      let data = [];
      
      if (mode === 'tasks') {
        data = state.employees.filter(function(e) {
            return (e.name || '').toLowerCase().includes(searchTerm);
        }).sort(function(a,b) {
            return (b.isAtWork - a.isAtWork) || (a.name || '').localeCompare(b.name || '');
        });
      } else {
        data = (state.stowData || []).filter(function(e) {
            return (e.name || '').toLowerCase().includes(searchTerm);
        });
        
        if (mode === 'beauty') {
            data = data.filter(function(e) {
                return e.skills && e.skills.beauty;
            });
        }
        
        data.forEach(function(e) { e._collision = findActiveAssignment(e.name); });
        
        data.sort(function(a, b) {
            if (a.isExcluded !== b.isExcluded) return (a.isExcluded ? 1 : 0) - (b.isExcluded ? 1 : 0);
            if (a.wasToday !== b.wasToday) return (a.wasToday ? 1 : 0) - (b.wasToday ? 1 : 0);
            
            const aRecent = recentNamesSet.has(a.name);
            const bRecent = recentNamesSet.has(b.name);
            if (aRecent !== bRecent) return (aRecent ? 1 : 0) - (bRecent ? 1 : 0);

            if ((a.lastDate || 0) !== (b.lastDate || 0)) return (a.lastDate || 0) - (b.lastDate || 0);
            return (a.name || '').localeCompare(b.name || '');
        });
      }

      // 2. Budowanie HTML
      dom.unifiedList.innerHTML = '';
      
      // Baner informacyjny (jeśli Cache)
      if (meta.source === 'CACHE') {
          const bannerClass = isDataOld ? 'bg-amber-100 border-amber-200 text-amber-800' : 'bg-yellow-50 border-yellow-200 text-yellow-700';
          const bannerIcon = isDataOld ? '⚠️' : '⚡';
          const bannerText = isDataOld ? `Archiwum z dn. <b>${meta.date}</b>` : `Tryb Offline (Cache: ${meta.date})`;
          
          dom.unifiedList.innerHTML += `
            <div class="sticky top-0 z-10 px-3 py-1.5 text-[10px] text-center font-medium border-b ${bannerClass}">
                ${bannerIcon} ${bannerText}
            </div>
          `;
      }

      if (data.length === 0) {
        if (mode !== 'tasks' && !state.isStowLoaded) {
          dom.unifiedList.innerHTML += '<div class="p-8 text-center text-slate-400 text-sm"><div class="loader-sm mb-2"></div>Pobieranie danych...</div>';
        } else {
          dom.unifiedList.innerHTML += '<div class="p-8 text-center text-slate-400 text-sm">Brak wyników wyszukiwania.<br><span class="text-xs opacity-75">(Sprawdź filtry szkoleń)</span></div>';
        }
        return;
      }

      const SVG_USER = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
      const SVG_ZAP = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>';
      const SVG_CHECK = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>';
      const SVG_BAN = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>';
      const SVG_LOCK = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
      const SVG_OFFLINE = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
      const SVG_REFRESH = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>';

      const htmlArray = data.map(function(emp) {
        const empName = emp.name || "Nieznany"; 
        const cleanName = empName.replace(/(\r\n|\n|\r)/gm, "").trim();
        const safeName = cleanName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        
        const collisionInfo = emp._collision; 
        
        let textColor = 'text-slate-700 font-medium';
        let rowBg = 'bg-white';
        let isDisabled = false; 
        let rowTitle = ''; 
        let statusIconHtml = '';
        
        let isSelected = false;
        let savedParams = null;

        if (mode === 'tasks') {
            isSelected = state.selectedEmployeeNames.has(cleanName);
        } else {
            isSelected = state.pendingAssignments.has(cleanName);
            if (isSelected) savedParams = state.pendingAssignments.get(cleanName);
        }

        if (isSelected) {
            rowBg = 'bg-blue-50'; 
        } 
        else if (mode !== 'tasks' && !emp.wasToday && !emp.isExcluded) {
            if (recentNamesSet.has(cleanName)) {
                rowBg = 'bg-rose-50'; 
                rowTitle = 'Ostatnio: ' + (recentDateLabel || 'Wcześniej');
            }
        }

        if (mode === 'tasks') {
            if (emp.isAtWork) {
                statusIconHtml = '<span class="text-emerald-500">' + SVG_USER + '</span>';
            } else {
                statusIconHtml = '<span class="text-slate-300">' + SVG_OFFLINE + '</span>';
                textColor = 'text-slate-400 italic';
            }
        } else {
            let baseIcon = '';
            let hoverIcon = '';
            let baseClass = '';
            let hoverClass = '';

            if (emp.isExcluded) {
                rowBg = 'bg-slate-50 opacity-60';
                textColor = 'text-slate-400 line-through';
                isDisabled = true;
                rowTitle = "Pracownik wykluczony ręcznie";
                baseIcon = SVG_BAN;
                hoverIcon = SVG_REFRESH;
                baseClass = 'text-red-400';
                hoverClass = 'text-blue-500'; 
            } 
            else if (collisionInfo) {
                rowTitle = 'Zajęty w: ' + collisionInfo;
                baseIcon = SVG_ZAP;
                hoverIcon = SVG_LOCK; 
                baseClass = 'text-amber-500';
                hoverClass = 'text-red-500';
            }
            else if (emp.wasToday) {
                if (mode === 'missions') {
                    rowBg = 'bg-white';
                    isDisabled = false; 
                    rowTitle = "Już w misji (można dodać kolejną)";
                    baseIcon = SVG_CHECK; 
                    hoverIcon = SVG_USER; 
                    baseClass = 'text-green-500';
                    hoverClass = 'text-emerald-500';
                } else {
                    rowBg = 'bg-slate-100 opacity-60';
                    textColor = 'text-slate-400 italic line-through decoration-slate-300';
                    isDisabled = true;
                    rowTitle = "Pracownik już przypisany dzisiaj";
                    baseIcon = SVG_CHECK;
                    hoverIcon = SVG_LOCK;
                    baseClass = 'text-slate-400';
                    hoverClass = 'text-slate-500';
                }
            } 
            else {
                baseIcon = SVG_USER;
                hoverIcon = SVG_LOCK;
                baseClass = 'text-emerald-500';
                hoverClass = 'text-red-500';
            }

            statusIconHtml = `
                <div class="group relative flex items-center justify-center w-6 h-6 rounded-md hover:bg-slate-100 transition-colors cursor-pointer pointer-events-auto" 
                     onclick="event.stopPropagation(); handleToggleExclusion('${safeName}')" 
                     title="Kliknij, aby zmienić status">
                    <span class="block group-hover:hidden ${baseClass}">${baseIcon}</span>
                    <span class="hidden group-hover:block ${hoverClass}">${hoverIcon}</span>
                </div>
            `;
        }
        
        const disabledClass = (isListDisabled || isDisabled) ? 'opacity-50 pointer-events-none' : '';
        
        let controls = '';
        const historyBtn = (mode !== 'tasks') ? `
          <button class="text-slate-400 hover:text-blue-600 p-1 mr-1 transition-colors pointer-events-auto" title="Historia" onclick="event.stopPropagation(); handleShowHistory('${safeName}')">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
        ` : '';
        
        const statsBlock = (mode !== 'tasks') ? `
          <div class="flex items-center gap-1 text-[10px] mr-2 opacity-90 select-none">
            <span class="w-6 text-center py-0.5 ${getHeatColor(emp.weekCount, 'week')} rounded" title="Tydzień: ${emp.weekCount}">W:${emp.weekCount}</span>
            <span class="w-6 text-center py-0.5 ${getHeatColor(emp.monthCount, 'month')} rounded" title="Miesiąc: ${emp.monthCount}">M:${emp.monthCount}</span>
            <span class="w-6 text-center py-0.5 bg-slate-100 text-slate-500 border border-slate-200 rounded" title="Rok: ${emp.yearCount}">R:${emp.yearCount}</span>
          </div>
        ` : '';
        
        const buildSelect = function(options, val, type) {
            let selectHtml = `<select class="border border-slate-300 rounded text-[10px] h-7 bg-white assignment-param-${type} focus:border-blue-500 outline-none" 
                ${isDisabled ? 'disabled' : ''} 
                onclick="event.stopPropagation()" 
                onchange="handleParamChange('${safeName}', 'param${type}', this.value)"
                style="width: ${type===1 ? '44px' : (mode==='stow'?'56px':'112px')}">`;
            
            if (val) {
                const needle = '>' + val + '<';
                if (options.indexOf(needle) !== -1) {
                    options = options.replace(needle, ' selected>' + val + '<');
                } else if (val === 'Gr' && options.indexOf('>Gr<') !== -1) {
                    options = options.replace('>Gr<', ' selected>Gr<');
                }
            }
            return selectHtml + options + `</select>`;
        };

        if (mode !== 'tasks' && emp.wasToday && mode !== 'missions') {
             controls = historyBtn + statsBlock;
        } else {
             if (mode === 'tasks') {
                const cbChecked = isSelected ? 'checked' : '';
                controls = `<input type="checkbox" class="h-5 w-5 rounded text-blue-600 cursor-pointer task-checkbox pointer-events-none" ${cbChecked}>`;
             } 
             else if (mode === 'stow') {
                const brkOpts = `<option disabled ${!savedParams ? 'selected' : ''}>--</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>Gr</option>`;
                const flrOpts = `<option disabled ${!savedParams ? 'selected' : ''}>--</option><optgroup label="P1"><option>100</option><option>101</option><option>102</option><option>103</option><option>104</option></optgroup><optgroup label="P4"><option>400</option><option>401</option><option>402</option><option>403</option><option>404</option></optgroup>`;
                
                controls = historyBtn + statsBlock + 
                           buildSelect(brkOpts, savedParams ? savedParams.break : null, 1) + 
                           '<div class="w-1"></div>' + 
                           buildSelect(flrOpts, savedParams ? savedParams.floor : null, 2) + 
                           `<input type="checkbox" class="ml-2 h-4 w-4 rounded text-blue-600 stow-checkbox cursor-pointer" ${isDisabled ? 'disabled' : ''} ${isSelected ? 'checked' : ''}>`;
             }
             else if (mode === 'carts' || mode === 'beauty') {
                controls = historyBtn + statsBlock + 
                           `<input type="checkbox" class="ml-2 h-4 w-4 rounded text-blue-600 stow-checkbox cursor-pointer" ${isDisabled ? 'disabled' : ''} ${isSelected ? 'checked' : ''}>`;
             }
             else {
                const roles = (state.settings && state.settings.customRoles && state.settings.customRoles[mode]) || [];
                let roleOpts = `<option ${!savedParams ? 'selected' : ''} disabled>Rodzaj...</option>`;
                roles.forEach(r => { roleOpts += `<option>${r}</option>`; });
                
                controls = historyBtn + statsBlock + 
                           buildSelect(roleOpts, savedParams ? savedParams.break : null, 1) + 
                           `<input type="checkbox" class="ml-2 h-4 w-4 rounded text-blue-600 stow-checkbox cursor-pointer" ${isDisabled ? 'disabled' : ''} ${isSelected ? 'checked' : ''}>`;
             }
        }

        const clickAction = (mode === 'tasks' || !isDisabled) ? `onclick="handleRowClick('${safeName}', this, event)"` : '';
        const hoverClass = (mode === 'tasks') ? 'row-mode-task' : (isDisabled ? '' : 'hover:bg-slate-50');
        const checkedClass = isSelected ? 'checked' : ''; 

        const skillsHtml = getSkillIcons(emp.skills);
        const subHtml = emp.subgroup ? `<span class="inline-flex items-center justify-center ml-1.5 px-1.5 h-4 text-[9px] font-bold text-slate-500 bg-slate-100 border border-slate-200 rounded" title="Podgrupa ${emp.subgroup}">${emp.subgroup}</span>` : '';

        return `
          <div class="flex items-center justify-between p-2.5 mb-1 border-b border-slate-100 ${rowBg} ${hoverClass} ${checkedClass} cursor-pointer transition-all ${disabledClass}" ${clickAction} data-name="${safeName}" title="${rowTitle}">
            <div class="flex items-center gap-3 min-w-0">
              <div class="shrink-0">
                  ${statusIconHtml}
              </div>
              <div class="flex flex-col overflow-hidden">
                  <div class="flex items-center">
                    <span class="truncate text-sm ${textColor}">${cleanName}</span>
                    ${subHtml}
                  </div>
                  ${skillsHtml}
              </div>
            </div>
            <div class="row-control-group">
              ${controls}
            </div>
          </div>
        `;
      });
      
      dom.unifiedList.innerHTML += htmlArray.join('');
      
      if (mode !== 'tasks' && typeof updateActionCount === 'function') updateActionCount();
      if(typeof updateClearButtonVisibility === 'function') updateClearButtonVisibility();

  } catch (err) {
      console.error("Błąd listy:", err);
      if (dom.unifiedList) {
          dom.unifiedList.innerHTML = `<div class="p-4 text-center text-red-500 text-xs font-mono border border-red-200 bg-red-50 rounded m-2">
            <strong>Błąd renderowania listy:</strong><br>${err.message}
          </div>`;
      }
  }
}

// === OBSŁUGA ZMIANY PARAMETRÓW (Persistent) ===
function handleParamChange(nameEncoded, type, value) {
    const name = nameEncoded.replace(/\\'/g, "'").replace(/&quot;/g, '"');
    
    if (!state.pendingAssignments.has(name)) {
        state.pendingAssignments.set(name, { break: '', floor: '', role: '' });
        const row = document.querySelector('div[data-name="' + nameEncoded + '"]');
        if (row) {
            const cb = row.querySelector('.stow-checkbox');
            if (cb) cb.checked = true;
            row.classList.add('bg-blue-50');
            row.classList.remove('bg-white');
        }
        if(typeof updateActionCount === 'function') updateActionCount();
        if(typeof updateClearButtonVisibility === 'function') updateClearButtonVisibility();
    }

    const data = state.pendingAssignments.get(name);
    if (type === 'param1') data.break = value; 
    if (type === 'param2') data.floor = value;
    state.pendingAssignments.set(name, data);
}

// === INTERAKCJE WIERSZA ===

function handleRowClick(name, rowEl, event) {
  if (!event && typeof window.event !== 'undefined') event = window.event;

  if (state.currentMode === 'tasks' && !state.isEmployeeTaskMode) return; 
  
  if (event && event.target) {
      const tag = event.target.tagName;
      if (tag === 'SELECT' || tag === 'OPTION' || tag === 'BUTTON' || event.target.closest('button')) return;
  }

  // --- TRYB ZADAŃ ---
  if (state.currentMode === 'tasks') {
    const cb = rowEl.querySelector('.task-checkbox');
    const wasSelected = state.selectedEmployeeNames.has(name);
    
    if (wasSelected) {
      state.selectedEmployeeNames.delete(name);
      if(cb) cb.checked = false;
      rowEl.classList.remove('checked');
    } else {
      state.selectedEmployeeNames.add(name);
      if(cb) cb.checked = true;
      rowEl.classList.add('checked');
    }
    
    if (!wasSelected && dom.globalSearch && dom.globalSearch.value.trim() !== '') {
        dom.globalSearch.value = '';
        renderUnifiedList();
        if(dom.globalSearch) dom.globalSearch.focus();
    }
    
    if(typeof updateFormStateUI === 'function') updateFormStateUI();
  } 
  // --- TRYB ROTACYJNY ---
  else {
    const cb = rowEl.querySelector('.stow-checkbox');
    if (!cb || cb.disabled) return;
    
    let intentToCheck = false;
    if (event && event.target && event.target.tagName === 'INPUT') { 
        intentToCheck = cb.checked;
    } else { 
        intentToCheck = !cb.checked;
    }

    if (intentToCheck) {
        const collisionInfo = findActiveAssignment(name);
        if (collisionInfo) {
            if (event.target.tagName === 'INPUT') cb.checked = false; 
            if (typeof openCollisionModalUI === 'function') {
                openCollisionModalUI(name, collisionInfo, cb);
            }
            return; 
        }
        
        let val1 = '';
        let val2 = '';
        const s1 = rowEl.querySelector('.assignment-param-1');
        const s2 = rowEl.querySelector('.assignment-param-2');
        if (s1) val1 = s1.value;
        if (s2) val2 = s2.value;
        
        state.pendingAssignments.set(name, { break: val1, floor: val2 });
        
        if (event && event.target && event.target.tagName !== 'INPUT') cb.checked = true;
        rowEl.classList.add('bg-blue-50');
        rowEl.classList.remove('bg-white');

        if (dom.globalSearch && dom.globalSearch.value.trim() !== '') {
            dom.globalSearch.value = '';
            renderUnifiedList(); 
            if(dom.globalSearch) dom.globalSearch.focus();
        }

    } else {
        state.pendingAssignments.delete(name);
        
        if (event && event.target && event.target.tagName !== 'INPUT') cb.checked = false;
        rowEl.classList.remove('bg-blue-50');
        rowEl.classList.add('bg-white');
        
        const s1 = rowEl.querySelector('.assignment-param-1');
        const s2 = rowEl.querySelector('.assignment-param-2');
        if(s1) s1.selectedIndex = 0;
        if(s2) s2.selectedIndex = 0;
    }
    
    if(typeof updateActionCount === 'function') updateActionCount();
  }
  
  if(typeof updateClearButtonVisibility === 'function') updateClearButtonVisibility();
}

// === NOWE: OBSŁUGA POTWIERDZENIA STARYCH DANYCH ===
window.confirmShowOldData = function() {
    state.showOldDataConfirmed = true;
    renderUnifiedList(); // Przerysuj (teraz wejdzie w tryb "Pokaż baner" zamiast "Blokuj")
};

// === UTILS ===
function updateActionCount() {
  if (!dom.unifiedList || !dom.actionCount) return;
  
  const count = state.pendingAssignments ? state.pendingAssignments.size : 0;
  dom.actionCount.textContent = count;
  
  if(dom.mainActionBtn) {
    dom.mainActionBtn.disabled = (count === 0);
    if (count === 0) dom.mainActionBtn.classList.add('opacity-50', 'cursor-not-allowed');
    else dom.mainActionBtn.classList.remove('opacity-50', 'cursor-not-allowed');
  }
}

// Global Export
window.renderUnifiedList = renderUnifiedList;
window.handleRowClick = handleRowClick;
window.handleParamChange = handleParamChange;

console.log("Moduł UI List załadowany pomyślnie.");
</script>
