<style>
/* Style dla Edytora Rich Text */
.rich-editor-container {
    display: flex;
    flex-direction: column;
    border: 1px solid #cbd5e1; /* slate-300 */
    border-radius: 0.5rem; /* rounded-lg */
    background-color: #fff;
    overflow: hidden;
    width: 100%;
    transition: all 0.2s;
}

.rich-editor-container:focus-within {
    border-color: #3b82f6; /* blue-500 */
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); /* ring-2 */
}

.editor-toolbar {
    display: flex;
    gap: 2px;
    padding: 4px 8px;
    background-color: #f8fafc; /* slate-50 */
    border-bottom: 1px solid #e2e8f0; /* slate-200 */
    flex-wrap: wrap;
}

.editor-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    padding: 0;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: #64748b; /* slate-500 */
    cursor: pointer;
    transition: all 0.1s;
    font-size: 12px;
    font-weight: bold;
}

.editor-btn:hover {
    background-color: #e2e8f0; /* slate-200 */
    color: #334155; /* slate-700 */
}

.editor-btn.active {
    background-color: #cbd5e1; /* slate-300 */
    color: #0f172a; /* slate-900 */
}

.editor-separator {
    width: 1px;
    background-color: #cbd5e1;
    margin: 0 4px;
    height: 16px;
    align-self: center;
}

.editor-content {
    min-height: 42px; /* Wysokość jak poprzedni textarea */
    max-height: 300px;
    overflow-y: auto;
    padding: 8px 12px;
    font-size: 14px; /* text-sm */
    line-height: 1.5;
    outline: none;
    color: #1e293b; /* slate-800 */
    background-color: #f8fafc; /* slate-50 */
    cursor: text;
}

.editor-content:focus {
    background-color: #fff;
}

/* Placeholder symulowany */
.editor-content:empty:before {
    content: attr(data-placeholder);
    color: #94a3b8; /* slate-400 */
    pointer-events: none;
    display: block; /* Dla Firefoxa */
}

/* Style wewnątrz edytora */
.editor-content b, .editor-content strong { font-weight: 700; }
.editor-content i, .editor-content em { font-style: italic; }
.editor-content u { text-decoration: underline; }
.editor-content ul { list-style-type: disc; padding-left: 20px; margin: 4px 0; }
.editor-content ol { list-style-type: decimal; padding-left: 20px; margin: 4px 0; }
.editor-content li { margin-bottom: 2px; }
.editor-content div { margin-bottom: 0; } /* Reset domyślnych divów w contenteditable */
</style>

<script>
// Moduł: JS-UI-Editor
// Obsługa prostego edytora WYSIWYG

const editor = {
    container: null,
    contentArea: null,
    
    init: function(containerId) {
        this.container = document.getElementById(containerId);
        if (!this.container) return;
        
        this.contentArea = this.container.querySelector('.editor-content');
        
        // Obsługa przycisków toolbar
        const buttons = this.container.querySelectorAll('.editor-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault(); // Zapobiega utracie fokusu
                const cmd = btn.dataset.cmd;
                const val = btn.dataset.val || null;
                
                document.execCommand(cmd, false, val);
                
                // Aktualizuj stan przycisków (np. czy bold jest aktywny)
                this.updateToolbarState();
                
                // Fokus wraca do edytora
                if (this.contentArea) this.contentArea.focus();
            });
        });

        // Nasłuchiwanie zmian zaznaczenia, aby aktualizować toolbar
        if (this.contentArea) {
            this.contentArea.addEventListener('keyup', () => this.updateToolbarState());
            this.contentArea.addEventListener('mouseup', () => this.updateToolbarState());
            this.contentArea.addEventListener('click', () => this.updateToolbarState());
            
            // Obsługa wklejania (czyszczenie formatowania z Worda/innych stron)
            this.contentArea.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });
        }
    },

    updateToolbarState: function() {
        if (!this.container) return;
        const buttons = this.container.querySelectorAll('.editor-btn[data-cmd]');
        
        buttons.forEach(btn => {
            const cmd = btn.dataset.cmd;
            // Sprawdź czy komenda jest aktywna w aktualnym zaznaczeniu
            if (document.queryCommandState(cmd)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    },

    getContent: function() {
        if (!this.contentArea) return '';
        // Zwracamy HTML, ale jeśli jest pusty (tylko <br> lub spacje), zwróć pusty string
        const html = this.contentArea.innerHTML;
        const text = this.contentArea.innerText.trim();
        if (!text && !html.includes('<img')) return ''; // Proste sprawdzenie pustki
        return html;
    },

    setContent: function(html) {
        if (this.contentArea) {
            this.contentArea.innerHTML = html;
        }
    },

    reset: function() {
        if (this.contentArea) {
            this.contentArea.innerHTML = '';
        }
    },
    
    focus: function() {
        if (this.contentArea) this.contentArea.focus();
    }
};

// Globalny eksport
window.richEditor = editor;
</script>
